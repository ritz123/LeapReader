name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1a. Build Linux ──────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux installers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install FUSE library
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Build & package Linux installers
        run: bash scripts/build-dist.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux installers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  # ── 1b. Build Windows ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: error

  # ── 2. Test Linux AppImage ───────────────────────────────────────────────────
  test-linux:
    name: Validate AppImage
    needs: build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install FUSE library for AppImage testing
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          name: linux-installers
          path: release/

      - name: Make AppImage executable
        run: chmod +x release/*.AppImage

      - name: Run AppImage tests
        run: bash scripts/test-appimage.sh "" "${{ github.ref_name }}"

  # ── 3. Publish (Linux tests + Windows build must pass) ───────────────────────
  publish:
    name: Publish GitHub Release
    needs: [test-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: linux-installers
          path: release/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Leap Reader ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/*.AppImage
            release/*.deb
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
